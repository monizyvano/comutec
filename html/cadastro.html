<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comutec | Registar Empresa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>

    <!-- Fundo decorativo -->
    <div class="fundo-decorativo">
        <div class="circulo circulo--1"></div>
        <div class="circulo circulo--2"></div>
    </div>

    <!-- Contentor principal -->
    <div class="caixa-registo">

        <!-- Cabeçalho do formulário -->
        <div class="cabecalho-registo">
            <a href="../index.html" class="logotipo">
                <svg class="logotipo__icone" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="url(#gc)" stroke-width="2"/>
                    <path d="M12 20 C12 15, 20 10, 28 14 C24 18, 20 16, 16 22 C14 26, 16 30, 20 30 C24 30, 28 26, 28 22" stroke="url(#gc)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                    <defs>
                        <linearGradient id="gc" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#00e5cc"/>
                            <stop offset="100%" stop-color="#0075ff"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span>COMUTEC</span>
            </a>
            <h1>Registar Empresa</h1>
            <p>Crie a sua conta corporativa e aceda às nossas soluções</p>
        </div>

        <!-- Formulário de cadastro -->
        <form id="formulario-registo" novalidate>

            <!-- Nome da empresa — ocupa toda a largura -->
            <div class="grupo-campo largura-total">
                <label for="nome-empresa">Nome da Empresa</label>
                <input
                    type="text"
                    id="nome-empresa"
                    name="nome_empresa"
                    placeholder="Ex: Comutec Lda"
                    required
                >
                <span class="mensagem-erro" id="erro-nome"></span>
            </div>

            <!-- E-mail corporativo -->
            <div class="grupo-campo">
                <label for="email">E-mail Corporativo</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="contacto@empresa.ao"
                    required
                >
                <span class="mensagem-erro" id="erro-email"></span>
            </div>

            <!-- NIF -->
            <div class="grupo-campo">
                <label for="nif">NIF da Empresa</label>
                <input
                    type="text"
                    id="nif"
                    name="nif"
                    placeholder="9 algarismos"
                    maxlength="9"
                    required
                >
                <span class="mensagem-erro" id="erro-nif"></span>
            </div>

            <!-- Contacto telefónico -->
            <div class="grupo-campo">
                <label for="contacto">Contacto Telefónico</label>
                <input
                    type="tel"
                    id="contacto"
                    name="contacto"
                    placeholder="+244 900 000 000"
                    required
                >
                <span class="mensagem-erro" id="erro-contacto"></span>
            </div>

            <!-- Endereço — ocupa toda a largura -->
            <div class="grupo-campo largura-total">
                <label for="endereco">Endereço</label>
                <input
                    type="text"
                    id="endereco"
                    name="endereco"
                    placeholder="Rua, Cidade, Província"
                    required
                >
                <span class="mensagem-erro" id="erro-endereco"></span>
            </div>

            <!-- Palavra-passe -->
            <div class="grupo-campo">
                <label for="senha">Palavra-passe</label>
                <div class="campo-com-icone">
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Mínimo 8 caracteres"
                        required
                    >
                    <button type="button" class="btn-ver-senha" id="btn-ver-senha" aria-label="Mostrar palavra-passe">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <!-- Indicador de força da senha -->
                <div class="forcometro" id="forcometro">
                    <div class="forcometro__barra" id="barra-forca"></div>
                </div>
                <span class="forcometro__texto" id="texto-forca"></span>
                <span class="mensagem-erro" id="erro-senha"></span>
            </div>

            <!-- Confirmar palavra-passe -->
            <div class="grupo-campo">
                <label for="confirmar-senha">Confirmar Palavra-passe</label>
                <input
                    type="password"
                    id="confirmar-senha"
                    name="confirmar_senha"
                    placeholder="Repita a palavra-passe"
                    required
                >
                <span class="mensagem-erro" id="erro-confirmar"></span>
            </div>

            <!-- Botões de acção — ocupam toda a largura -->
            <div class="acoes-formulario">
                <button type="submit" class="botao-submeter" id="btn-submeter">
                    <span>Criar Conta Corporativa</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </button>

                <div class="links-rodape">
                    <span>Já tem conta? <a href="login.html">Entrar</a></span>
                    <a href="../index.html" class="link-voltar">← Página inicial</a>
                </div>
            </div>

        </form>
    </div>

    <script src="../js/cadastro.js"></script>
</body>
</html>
