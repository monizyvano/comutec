<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comutec | Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="fundo-decorativo">
        <div class="circulo circulo--1"></div>
        <div class="circulo circulo--2"></div>
    </div>

    <div class="caixa-login">

        <!-- Área do logótipo com imagem real -->
        <div class="area-logo">
            <a href="../index.html" class="logotipo">
                <!-- Logo redondo oficial -->
                <img src="../assets/logoComutecR.jpg" alt="Comutec" class="logotipo__img-redondo">
                <div class="logotipo__texto">
                    <span class="logotipo__nome">
                        <span class="nome-comu">COMU</span><span class="nome-tec">TEC</span>
                    </span>
                    <span class="logotipo__slogan">Tecnologia e Comunicação</span>
                </div>
            </a>
            <h1>Bem-vindo de volta</h1>
            <p>Aceda ao seu painel de controlo</p>
        </div>

        <form id="formulario-login" novalidate>

            <div class="grupo-campo">
                <label for="email">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    E-mail
                </label>
                <input type="email" id="email" name="email" placeholder="exemplo@comutec.ao" autocomplete="email" required>
                <span class="mensagem-erro" id="erro-email"></span>
            </div>

            <div class="grupo-campo">
                <label for="palavra-passe">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Palavra-passe
                </label>
                <div class="campo-com-icone">
                    <input type="password" id="palavra-passe" name="palavra-passe" placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" class="btn-ver-senha" id="btn-ver-senha" aria-label="Mostrar palavra-passe">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <span class="mensagem-erro" id="erro-senha"></span>
            </div>

            <a href="/html/recuperar.html" class="link-esqueceu">Esqueceu-se da palavra-passe?</a>

            <button type="submit" class="botao-entrar" id="btn-entrar">
                <span>Entrar</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
            </button>
        </form>

        <div class="rodape-formulario">
            Não tem conta? <a href="cadastro.html">Registar empresa</a>
        </div>
        <a href="../index.html" class="link-voltar">← Voltar à página inicial</a>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
